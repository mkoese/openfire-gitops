apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-openfire
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "openfire.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "openfire.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow XMPP client connections: same namespace, plus external clients
    # when the LoadBalancer is enabled (scoped by networkPolicy.clientCIDRs)
    - from:
        - podSelector: {}
        {{- if .Values.networkPolicy.clientCIDRs }}
        {{- range .Values.networkPolicy.clientCIDRs }}
        - ipBlock:
            cidr: {{ . }}
        {{- end }}
        {{- else if .Values.loadBalancer.enabled }}
        - ipBlock:
            cidr: 0.0.0.0/0
            {{- with .Values.networkPolicy.internalCIDRs }}
            # cluster-internal networks stay excluded: "open to the world"
            # must not also mean "open to every pod in the cluster"
            except:
              {{- toYaml . | nindent 14 }}
            {{- end }}
        {{- end }}
      ports:
        - protocol: TCP
          port: 5222
        - protocol: TCP
          port: 5223
    # Allow XMPP server-to-server: same namespace; inbound federation is an
    # explicit opt-in via networkPolicy.s2sCIDRs
    - from:
        - podSelector: {}
        {{- range .Values.networkPolicy.s2sCIDRs }}
        - ipBlock:
            cidr: {{ . }}
        {{- end }}
      ports:
        - protocol: TCP
          port: 5269
        - protocol: TCP
          port: 5270
    # Allow external components (same namespace only)
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 5275
        - protocol: TCP
          port: 5276
    # Allow BOSH/WebSocket (same namespace + OpenShift router)
    - from:
        - podSelector: {}
        - namespaceSelector:
            matchLabels:
              network.openshift.io/policy-group: ingress
      ports:
        - protocol: TCP
          port: 7070
        - protocol: TCP
          port: 7443
    # Allow file transfer proxy (same namespace only)
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 7777
    # Allow admin console (same namespace + OpenShift router)
    - from:
        - podSelector: {}
        - namespaceSelector:
            matchLabels:
              network.openshift.io/policy-group: ingress
      ports:
        - protocol: TCP
          port: 9090
        - protocol: TCP
          port: 9091
  egress:
    # Allow DNS
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow HTTP/HTTPS (plugin downloads, updates)
    - ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
    {{- if .Values.database.host }}
    # Allow database connections (PostgreSQL)
    - ports:
        - protocol: TCP
          port: {{ .Values.database.port }}
    {{- end }}
    {{- if .Values.auth.enabled }}
    # Allow Active Directory LDAP(S) + Global Catalog
    - ports:
        - protocol: TCP
          port: 389
        - protocol: TCP
          port: 636
        - protocol: TCP
          port: 3268
        - protocol: TCP
          port: 3269
    {{- end }}
    {{- if .Values.kerberos.enabled }}
    # Allow Kerberos (KDC)
    - ports:
        - protocol: TCP
          port: 88
        - protocol: UDP
          port: 88
    {{- end }}
    # Allow XMPP server-to-server federation
    - ports:
        - protocol: TCP
          port: 5269
        - protocol: TCP
          port: 5270
