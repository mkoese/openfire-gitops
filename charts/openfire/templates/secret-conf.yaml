{{/*
  Chart-managed Openfire configuration secret.

  Renders openfire.xml + security.xml from values:
    - database: external PostgreSQL (database.host set) or embedded (dev)
    - auth: AD-gated auth provider, LDAP settings, password policy
    - kerberos: SASL GSSAPI properties
  Secrets are injected as @@DB_PASSWORD@@ / @@LDAP_PASSWORD@@ placeholders by
  the init container (from database.existingSecret / auth.ldap.existingSecret)
  and encrypted by Openfire on first boot (see security.xml encrypt list).

  XML properties outside the reserved set (database.*, fqdn, adminConsole.*,
  locale, setup) are migrated into DB system properties when setup completes
  (XMPPServer.finalSetupSteps) -- that is how sasl.*, ldap.*, provider.* and
  adAuth.* below become regular Openfire system properties.

  For full control, create the secret externally and set conf.existingSecret
  (this template is then not rendered):
    oc create secret generic my-openfire-conf \
      --from-file=openfire.xml=<path-to-openfire.xml> \
      --from-file=security.xml=<path-to-security.xml> -n openfire
*/}}
{{- if not .Values.conf.existingSecret }}
{{- if and (not .Values.adminPasswordSecret) (eq .Values.adminPassword "admin") (or .Values.auth.enabled .Values.database.host) }}
{{- fail "adminPassword is still the dev default 'admin' while production features are configured (auth.enabled / database.host). Set adminPasswordSecret (recommended) or a strong adminPassword." }}
{{- end }}
{{- if and .Values.database.host (not .Values.database.existingSecret) }}
{{- fail "database.host is set but database.existingSecret is empty -- the @@DB_PASSWORD@@ placeholder would never be injected and become the literal password." }}
{{- end }}
{{- if and .Values.auth.enabled (not .Values.auth.ldap.existingSecret) }}
{{- fail "auth.enabled=true but auth.ldap.existingSecret is empty -- the @@LDAP_PASSWORD@@ placeholder would never be injected." }}
{{- end }}
{{- $fqdn := include "openfire.fqdn" . -}}
{{- $domain := include "openfire.xmppDomain" . -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-openfire-conf
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "openfire.labels" . | nindent 4 }}
type: Opaque
stringData:
  openfire.xml: |
    <?xml version="1.0" encoding="UTF-8"?>
    <jive>
      <adminConsole>
        <port>9090</port>
        <securePort>9091</securePort>
      </adminConsole>

      {{- if .Values.database.host }}
      <!-- External PostgreSQL (JDBC driver baked into the image via lib.txt) -->
      <connectionProvider>
        <className>org.jivesoftware.database.DefaultConnectionProvider</className>
      </connectionProvider>
      <database>
        <defaultProvider>
          <driver>org.postgresql.Driver</driver>
          <serverURL>jdbc:postgresql://{{ .Values.database.host }}:{{ .Values.database.port }}/{{ .Values.database.name }}</serverURL>
          <username>{{ .Values.database.user }}</username>
          <password>@@DB_PASSWORD@@</password>
          <minConnections>{{ .Values.database.minConnections }}</minConnections>
          <maxConnections>{{ .Values.database.maxConnections }}</maxConnections>
          <connectionTimeout>1.0</connectionTimeout>
        </defaultProvider>
      </database>
      {{- else }}
      <!-- Embedded database (development only) -->
      <connectionProvider>
        <className>org.jivesoftware.database.EmbeddedConnectionProvider</className>
      </connectionProvider>
      {{- end }}

      <!-- Migrated to database on first boot -->
      <rss>
        <enabled>false</enabled>
      </rss>
      <update>
        <service>
          <enabled>false</enabled>
        </service>
        <notify>
          <admins>false</admins>
        </notify>
      </update>

      <locale>en</locale>
      <fqdn>{{ $fqdn }}</fqdn>

      {{- if .Values.auth.enabled }}

      <!-- AD-gated auth provider (openfire-authprovider JAR in /opt/openfire/lib).
           These XML properties become DB system properties when setup completes. -->
      <provider>
        <auth>
          <className>com.mkoese.openfire.auth.AdGatedAuthProvider</className>
        </auth>
        {{- if .Values.kerberos.enabled }}
        <authorization>
          <classList>com.mkoese.openfire.auth.AdGatedAuthorizationPolicy</classList>
        </authorization>
        {{- end }}
      </provider>

      <!-- Directory connection (used by LdapManager for the AD gate) -->
      <ldap>
        <host>{{ .Values.auth.ldap.host }}</host>
        <port>{{ .Values.auth.ldap.port }}</port>
        <sslEnabled>{{ .Values.auth.ldap.sslEnabled }}</sslEnabled>
        <baseDN>{{ .Values.auth.ldap.baseDN | replace "&" "&amp;" | replace "<" "&lt;" | replace ">" "&gt;" }}</baseDN>
        <adminDN>{{ .Values.auth.ldap.adminDN | replace "&" "&amp;" | replace "<" "&lt;" | replace ">" "&gt;" }}</adminDN>
        <searchFilter>{{ .Values.auth.ldap.searchFilter | replace "&" "&amp;" | replace "<" "&lt;" | replace ">" "&gt;" }}</searchFilter>
        <adminPassword>@@LDAP_PASSWORD@@</adminPassword>
        <usernameField>{{ .Values.auth.ldap.usernameField }}</usernameField>
        <nameField>{{ .Values.auth.ldap.nameField | replace "&" "&amp;" | replace "<" "&lt;" | replace ">" "&gt;" }}</nameField>
        <emailField>{{ .Values.auth.ldap.emailField }}</emailField>
      </ldap>

      <!-- Provider behavior + password policy for locally chosen passwords -->
      <adAuth>
        <localOnlyUsers>{{ .Values.auth.localOnlyUsers | replace "&" "&amp;" | replace "<" "&lt;" | replace ">" "&gt;" }}</localOnlyUsers>
        <reenrollOnBindSuccess>{{ .Values.auth.reenrollOnBindSuccess }}</reenrollOnBindSuccess>
        <password>
          <minLength>{{ .Values.auth.password.minLength }}</minLength>
          <minClasses>{{ .Values.auth.password.minClasses }}</minClasses>
          <rejectUsername>{{ .Values.auth.password.rejectUsername }}</rejectUsername>
        </password>
      </adAuth>

      <!-- SASL mechanisms offered in parallel; store only SCRAM hashes -->
      <sasl>
        <mechs>PLAIN,SCRAM-SHA-1{{ if .Values.kerberos.enabled }},GSSAPI{{ end }}</mechs>
        {{- if .Values.kerberos.enabled }}
        <approvedRealms>{{ .Values.kerberos.realm }}</approvedRealms>
        <gssapi>
          <config>/opt/openfire/kerberos/gss.conf</config>
          <useSubjectCredsOnly>false</useSubjectCredsOnly>
          <debug>false</debug>
        </gssapi>
        {{- end }}
      </sasl>
      <user>
        <scramHashedPasswordOnly>true</scramHashedPasswordOnly>
      </user>
      {{- end }}

      <!-- Autosetup: runs once on first start, then replaces itself with <setup>true</setup> -->
      <autosetup>
        <run>true</run>
        <locale>en</locale>
        <xmpp>
          <domain>{{ $domain }}</domain>
          <fqdn>{{ $fqdn }}</fqdn>
        </xmpp>
        <encryption>
          <algorithm>AES</algorithm>
        </encryption>
        <database>
          {{- if .Values.database.host }}
          <mode>standard</mode>
          <defaultProvider>
            <driver>org.postgresql.Driver</driver>
            <serverURL>jdbc:postgresql://{{ .Values.database.host }}:{{ .Values.database.port }}/{{ .Values.database.name }}</serverURL>
            <username>{{ .Values.database.user }}</username>
            <password>@@DB_PASSWORD@@</password>
            <minConnections>{{ .Values.database.minConnections }}</minConnections>
            <maxConnections>{{ .Values.database.maxConnections }}</maxConnections>
            <connectionTimeout>1.0</connectionTimeout>
          </defaultProvider>
          {{- else }}
          <mode>embedded</mode>
          {{- end }}
        </database>
        <profile>
          <mode>default</mode>
        </profile>
        <admin>
          <email>admin@{{ $domain }}</email>
          <!-- With auth.enabled this password must satisfy the policy above.
               adminPasswordSecret (if set) is injected by the init container as
               @@ADMIN_PASSWORD@@ so the credential is never rendered here. -->
          <password>{{ if .Values.adminPasswordSecret }}@@ADMIN_PASSWORD@@{{ else }}{{ .Values.adminPassword }}{{ end }}</password>
        </admin>
      </autosetup>

      {{- if .Values.tls.keystorePasswordSecret }}
      <!-- Keystore password: injected from tls.keystorePasswordSecret by the
           init container (first boot), then kept in sync on every start. -->
      <xmpp>
        <socket>
          <ssl>
            <keypass>@@KEYSTORE_PASS@@</keypass>
            <trustpass>@@KEYSTORE_PASS@@</trustpass>
          </ssl>
        </socket>
      </xmpp>
      {{- end }}
      {{- with .Values.conf.extraXml }}

      <!-- conf.extraXml (values): non-reserved properties are seeded into DB
           system properties at first setup; afterwards the admin console /
           DB is the source of truth. -->
      {{- . | nindent 6 }}
      {{- end }}
    </jive>

  security.xml: |
    <?xml version="1.0" encoding="UTF-8"?>
    <security>
      <encrypt>
        <algorithm>AES</algorithm>
        <key>
          <!-- Openfire generates a unique key on first startup; the conf PVC
               persists it. Losing it makes encrypted properties unreadable. -->
          <current></current>
        </key>
        <property>
          <!-- Properties encrypted automatically on first use -->
          <name>database.defaultProvider.username</name>
          <name>database.defaultProvider.password</name>
          {{- if .Values.auth.enabled }}
          <name>ldap.adminPassword</name>
          {{- end }}
        </property>
      </encrypt>
    </security>
{{- end }}
